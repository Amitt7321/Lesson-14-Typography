<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Headings, small and Dl</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</head>
<body>
    <Div class="container">
    <h1>Heading Lists</h1>
    <h1 class="display-1">Hello</h1>
    <h1 class="display-2">Hello</h1>
    <h1 class="display-3">Hello</h1>
    <h1 class="display-4">Hello</h1>
    </Div>
    <Div class="container">
        <h1>Light, Secondary Text with small tag and class text-muted
        <small class="text-muted">Hello Everyone</small>
        </h1>
        <dl>
            <dt>Tea</dt>
            <dd>Brown masala drink</dd>
        </dl>
        </Div>
</body>
</html>
